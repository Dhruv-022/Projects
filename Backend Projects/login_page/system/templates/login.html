<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Login Entrance</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background: white; width: 340px; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.25); text-align: center;">
        <h2 style="color: #333; margin-top: 0; margin-bottom: 25px;">🔒 Secure Login Gateway</h2>
        
        {% if error %}
            <div style="background: #f8d7da; color: #721c24; padding: 11px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; font-weight: bold;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="">
            {% csrf_token %}
            <p style="text-align: left; margin-bottom: 6px; font-weight: bold; color: #555;">Username String:</p>
            <input type="text" name="html_username" required placeholder="Enter username" style="width: 93%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px;">
            
            <p style="text-align: left; margin-bottom: 6px; font-weight: bold; color: #555;">Password String:</p>
            <input type="password" name="html_password" required placeholder="Enter password" style="width: 93%; padding: 10px; margin-bottom: 25px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px;">
            
            <button type="submit" style="width: 100%; background: #1abc9c; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer;">Authenticate Profile</button>
        </form>

        <p style="margin-top: 25px; font-size: 14px; color: #7f8c8d;">
            Need a profile record? <a href="/registration/" style="color: #3498db; text-decoration: none; font-weight: bold;">Register Profile Here ➡️</a>
        </p>
    </div>

</body>
</html>
